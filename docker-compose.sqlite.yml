services:
  myna:
    image: ghcr.io/uskyu/myna:latest
    container_name: myna-app
    restart: unless-stopped
    ports:
      - "3456:3456"
    environment:
      - PORT=3456
      - DB_TYPE=sqlite
    volumes:
      - app_data:/app/db
      - hermes_profiles:/root/.hermes/profiles

volumes:
  app_data:
  hermes_profiles:
