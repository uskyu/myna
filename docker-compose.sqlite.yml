services:
  myna:
    image: ghcr.io/uskyu/myna:latest
    container_name: myna-app
    restart: unless-stopped
    ports:
      - "3456:3456"
    environment:
      - PORT=3456
      - DB_TYPE=sqlite
    volumes:
      - app_db:/app/db
      - app_data:/app/data
      - hermes_profiles:/root/.hermes/profiles
      - /var/run/docker.sock:/var/run/docker.sock
      - ./docker-compose.sqlite.yml:/app/docker-compose.yml:ro

volumes:
  app_db:
  app_data:
  hermes_profiles:
